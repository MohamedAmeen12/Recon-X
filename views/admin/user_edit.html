<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Editing | Admin Dashboard</title>
  <link rel="stylesheet" href="/static/css/adminpages.css">
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg-image"></div>
  <div class="overlay"></div>

  <!-- SIDEBAR -->
  <div class="sidebar">
      <div class="sidebar-logo">
          <h2>ReconX</h2>
      </div>

<a href="/admin" class="sidebar-item">Dashboard</a>
<a href="/admin/user-edit" class="sidebar-item">User Editing</a>
<a href="/admin/audit-logs" class="sidebar-item">Audit Logs</a>
<a href="/admin/pending-users" class="sidebar-item">Pending Users</a>
<a href="/login" class="sidebar-item logout">Logout</a>

  </div>

  <!-- MAIN CONTENT -->
  <div class="content-table">

      <div class="user-management-row">
        <!-- USER TABLE -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Created At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>

        <!-- USER DOMAIN DETAILS -->
        <div class="add-user" id="userDomainsCard">
          <h2>User Domains</h2>
          <p id="userDomainsHeader" style="margin-bottom: 10px; font-size: 0.95rem; color: #e5e5e5;">
            Select a user and click "View Domains" to see their allowed and scanned domains.
          </p>
          <div id="userDomainsContent" style="text-align: left; font-size: 0.9rem;"></div>
        </div>
      </div>

      <!-- ADD USER FORM -->
      <div class="add-user">
        <h2>Add New User</h2>
        <form id="addUserForm" onsubmit="addUser(event)">
          <input id="username" placeholder="Username" required />
          <input id="email" type="email" placeholder="Email" required />
          <input id="password" type="password" placeholder="Password" required />
          <button type="submit">Add User</button>
        </form>
      </div>

  </div>

  <script src="/static/js/admin.js"></script>

</body>
</html>
