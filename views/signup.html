<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReconX Signup</title>
  <link rel="stylesheet" href="/static/css/signup.css" />
</head>

<body class="signup-page">



  <!-- Signup Container -->
  <div class="login-container">
    <img src="/static/assets/images/logo.png" alt="ReconX Logo" class="logo" />
    <h1 class="title">Create Your Account</h1>

    <form id="signupForm">
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="email" id="email" placeholder="Email" required />

      <div class="form-group">
        <label for="domains" class="field-label">Domains to Scan</label>
        <textarea id="domains" class="text-input" rows="3" placeholder="example.com&#10;sub.example.com"
          required></textarea>
        <p class="field-hint">
          Enter one or more domains you are authorized to scan. You can separate them by
          new lines or commas. Only these domains will be available for scanning.
        </p>
      </div>

      <input type="password" id="password" placeholder="Password" required />

      <div class="password-requirements">
        <p id="req-length" class="invalid">❌ 8 characters or more</p>
        <p id="req-special" class="invalid">❌ At least one special character</p>
      </div>

      <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
      <button type="submit">Sign Up</button>
    </form>

    <p class="signup-text">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>

  <script src="/static/js/signup.js"></script>
</body>

</html>
