<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReconX Login</title>
  <link rel="stylesheet" href="/static/css/login.css" />
</head>

<body>

  <div class="card">

    <div class="logo-box">
      <img src="/static/assets/images/logo.png" class="logo" />
    </div>

    <h1 class="title">Welcome Back</h1>

    <form id="loginForm">

      <!-- FIXED: input IDs added -->
      <input id="email" type="email" placeholder="Email" required />
      
      <div class="password-wrapper">
        <input id="password" type="password" placeholder="Password" required />
        <button type="button" class="eye-toggle" id="togglePassword" aria-label="Toggle password visibility">
          <!-- Eye icon -->
          <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>

      <button type="submit">Login</button>
    </form>

    <p class="foot-text">
      Don’t have an account?
      <a href="/signup">Create one</a>
    </p>

  </div>

  <!-- FIXED: script must be INSIDE body, only one closing tag -->
  <script src="/static/js/login.js"></script>

</body>
</html>
